services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: matridx
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 3;
      mc alias set local http://minio:9000 minio minio123;
      mc mb -p local/audio-temp || true;
      mc anonymous set private local/audio-temp || true;
      exit 0;"

  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    env_file:
      - ../.env
    environment:
      NOTES_STORAGE_ROOT: /data/notes
    depends_on:
      - postgres
      - redis
      - minio
    ports:
      - "8081:8081"
    volumes:
      - ./data/notes:/data/notes

  worker:
    build:
      context: ..
      dockerfile: apps/worker/Dockerfile
    env_file:
      - ../.env
    environment:
      NOTES_STORAGE_ROOT: /data/notes
    depends_on:
      - postgres
      - redis
      - minio
      - api
    volumes:
      - ./data/notes:/data/notes

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    env_file:
      - ../.env
    depends_on:
      - api
    ports:
      - "3122:3122"

volumes:
  pgdata:
  minio_data:
